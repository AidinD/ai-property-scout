<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt — AI Property Scout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-dark: #1a3c5e;
      --blue-mid:  #254e7a;
      --border:    #e5e7eb;
      --muted:     #6b7280;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo { font-size: 15px; font-weight: 800; color: var(--blue-dark); text-decoration: none; }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
    .email-box {
      background: #f5f7fa;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--blue-dark);
      letter-spacing: 0.2px;
    }
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--blue-dark); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">AI Property Scout</a>
</nav>

<main>
  <div class="card">
    <h1>Kontakt</h1>
    <p>Frågor om extensionen, licenser eller samarbeten? Hör av dig direkt på mail.</p>
    <div class="email-box">aipropertyscout@gmail.com</div>
  </div>
</main>

<footer>
  <a href="/">Tillbaka till startsidan</a> · <a href="/privacy">Integritetspolicy</a>
</footer>

</body>
</html>
